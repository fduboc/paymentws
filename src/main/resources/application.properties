# PostgreSQL datasource - local instance on localhost
spring.datasource.url=jdbc:postgresql://localhost:5432/payment
spring.datasource.username=fduboc
spring.datasource.password=abcde
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# =======================================================
#Redis configuration
# =======================================================
# Redis host/port
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.sentinel.master=mymaster
spring.redis.sentinel.nodes=127.0.0.1:26379,localhost:26379
spring.redis.sentinel.enabled=false

# =======================================================
#Jedis Pool configuration
# =======================================================
redis.maxTotal=20
redis.maxIdle=5
redis.minIdle=2

server.port=8081

# Payment service provider: "Stripe" or unsupported (throws 500)
payment.provider=Stripe

